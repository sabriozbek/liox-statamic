name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-west1
  SERVICE_NAME: liox-backend
  ARTIFACT_REGISTRY: gcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint & Code Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_mysql, mbstring, zip, pcntl, redis
          coverage: none

      - name: Create Required Directories
        run: mkdir -p bootstrap/cache storage

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: PHPStan
        run: ./vendor/bin/phpstan analyse --memory-limit=1G

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_mysql, mbstring, zip, pcntl, redis
          coverage: none

      - name: Create Required Directories
        run: mkdir -p bootstrap/cache storage

      - name: Copy Environment
        run: cp .env.example .env

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Generate Key
        run: php artisan key:generate

      - name: Run Migrations
        run: php artisan migrate --force

      - name: Run Tests
        run: php artisan test --parallel

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Google Cloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker
        run: gcloud auth configure-docker $REGION-docker.pkg.dev

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            $REGION-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
            $REGION-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}/${{ env.SERVICE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_ENV=production

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Google Cloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: $REGION-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          port: 8080
          min_instances: 1
          max_instances: 10
          concurrency: 100
          memory: 1Gi
          cpu: 1
          env_vars: |
            APP_ENV=production
            APP_DEBUG=false
            APP_URL=https://liox.uyumsoft.com
            STATAMIC_GIT_ENABLED=true
            STATAMIC_GIT_AUTOMATIC=true
            STATAMIC_GIT_PUSH=false
            STATAMIC_GIT_DISPATCH_DELAY=1
            STATAMIC_GIT_QUEUE_CONNECTION=database
            DB_CONNECTION=mysql
            DB_HOST=${{ secrets.CLOUD_SQL_PRIVATE_IP }}
            DB_PORT=3306
            DB_DATABASE=liox_production
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            QUEUE_CONNECTION=database
            SESSION_DRIVER=database
            REDIS_HOST=${{ secrets.REDIS_HOST }}
            MAIL_HOST=${{ secrets.MAIL_HOST }}
            MAIL_PORT=${{ secrets.MAIL_PORT }}
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            MAIL_FROM_ADDRESS=noreply@liox.uyumsoft.com
            CRM_LOGIN_URL=${{ secrets.CRM_LOGIN_URL }}
            CRM_SAVE_URL=${{ secrets.CRM_SAVE_URL }}
            CRM_USERNAME=${{ secrets.CRM_USERNAME }}
            CRM_PASSWORD=${{ secrets.CRM_PASSWORD }}
            STATAMIC_FORMS_DRIVER=eloquent
          vpc_connector: ${{ secrets.VPC_CONNECTOR }}
          set_cloudrun_condition: true

      - name: Run Database Migrations
        run: |
          gcloud run jobs create liox-migrate-${{ github.run_number }} \
            --image $REGION-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --command php \
            --args artisan,migrate,--force \
            --set-env-vars APP_ENV=production,DB_CONNECTION=mysql,DB_HOST=${{ secrets.CLOUD_SQL_PRIVATE_IP }},DB_PORT=3306,DB_DATABASE=liox_production,DB_USERNAME=${{ secrets.DB_USERNAME }},DB_PASSWORD=${{ secrets.DB_PASSWORD }},QUEUE_CONNECTION=database,SESSION_DRIVER=database,STATAMIC_FORMS_DRIVER=eloquent

      - name: Verify Deployment
        run: |
          sleep 10
          curl -f -s -o /dev/null -w "%{http_code}" ${{ secrets.DEPLOYMENT_URL }}/up
