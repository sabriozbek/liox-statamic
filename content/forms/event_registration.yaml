title: Etkinlik Kayıt Formu
honeypot: honeypot
store: true
inline_keyed_templates: false

fields:
  -
    handle: event_slug
    field:
      type: text
      display: Etkinlik Slug
      listable: true
      validate:
        - required
  -
    handle: event_title
    field:
      type: text
      display: Etkinlik Başlığı
      listable: true
  -
    handle: name
    field:
      type: text
      display: Ad Soyad
      listable: true
      validate:
        - required
  -
    handle: email
    field:
      type: text
      display: E-posta
      listable: true
      validate:
        - required
        - email
  -
    handle: tel
    field:
      type: text
      display: Telefon
      listable: true
  -
    handle: company
    field:
      type: text
      display: Şirket
      listable: true
  -
    handle: title
    field:
      type: text
      display: Ünvan
      listable: true
  -
    handle: attendee_count
    field:
      type: text
      display: Katılımcı Sayısı
      listable: true
  -
    handle: notes
    field:
      type: textarea
      display: Notlar
      listable: true
  -
    handle: path
    field:
      type: text
      display: Kaynak Sayfa
      listable: true
