title: Randevu Formu
honeypot: honeypot
store: true
inline_keyed_templates: false

fields:
  -
    handle: name
    field:
      type: text
      display: İsim
      validate:
        - required

  -
    handle: email
    field:
      type: email
      display: E-posta
      validate:
        - required
        - email

  -
    handle: phone
    field:
      type: text
      display: Telefon
      validate:
        - required

  -
    handle: company
    field:
      type: text
      display: Şirket Adı
      validate:
        - required

  -
    handle: preferred_date
    field:
      type: text
      display: Tercih Edilen Tarih

  -
    handle: preferred_time
    field:
      type: text
      display: Tercih Edilen Saat

  -
    handle: notes
    field:
      type: textarea
      display: Notlar

  -
    handle: crm_status
    field:
      type: text
      display: CRM Durumu
      listable: true

  -
    handle: crm_message
    field:
      type: textarea
      display: CRM Mesajı
      listable: true

  -
    handle: crm_http_code
    field:
      type: text
      display: CRM HTTP Kod
      listable: true
