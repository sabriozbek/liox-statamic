<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="LioXERP - Akıllı ERP Çözümleri" />
    <title>LioXERP - Akıllı ERP Çözümleri</title>
    <!-- Font Awesome 6.5 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  </head>
  <body>
    <div id="root"><!--app-html--></div>
    <script>
      window.__LIOX_HOME_PAGE_CONTENT__ = null;
      window.__LIOX_ANNOUNCEMENT__ = null;
      window.__LIOX_BOOTSTRAP_PROMISE__ = Promise.resolve();
    </script>
    <script>
      const apiBase = window.location.hostname === 'localhost'
        ? 'http://127.0.0.1:8000'
        : window.location.origin;

      const preloadJson = async (url) => {
        try {
          const response = await fetch(url, {
            headers: { Accept: 'application/json' },
            credentials: 'same-origin',
          });

          if (!response.ok) return null;
          return await response.json();
        } catch {
          return null;
        }
      };

      window.__LIOX_BOOTSTRAP_PROMISE__ = Promise.all([
        preloadJson(`${apiBase}/api/page/home`),
        preloadJson(`${apiBase}/api/global/announcement`),
      ]).then(([homeContent, announcement]) => {
        window.__LIOX_HOME_PAGE_CONTENT__ = homeContent;
        window.__LIOX_ANNOUNCEMENT__ = announcement;

        if (homeContent) {
          try {
            window.localStorage.setItem('liox-home-page-content', JSON.stringify(homeContent));
          } catch {}
        }
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
